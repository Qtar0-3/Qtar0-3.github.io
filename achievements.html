<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アチーブメント一覧 | コスプレアチーブメント</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">🏆 <span class="mark">コスプレアチーブメント</span></a>
    <nav class="nav">
      <a href="index.html">TOP</a>
      <a href="achievements.html" class="active">一覧</a>
      <a href="bingo.html">ビンゴ</a>
    </nav>
    <span class="progress-badge" id="progressBadge"></span>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <h1>📜 アチーブメント一覧</h1>
    <p>達成した実績をタップ（クリック）して獲得！もう一度タップで取り消せます。獲得状況は自動保存されます。</p>
  </div>

  <div class="filters" id="filters"></div>

  <div id="achList"></div>

  <section class="add-box">
    <h3>⭐ アチーブメントを追加する</h3>
    <p class="hint">自分だけの実績をいつでも追加できます（例：「推しの誕生日にコスした」）。追加した実績はビンゴにも登場します。</p>
    <form class="add-form" id="addForm">
      <input type="text" class="f-icon" id="fIcon" placeholder="絵文字" maxlength="4">
      <input type="text" class="f-title" id="fTitle" placeholder="タイトル（必須）" maxlength="30" required>
      <input type="text" class="f-desc" id="fDesc" placeholder="達成条件・説明" maxlength="60">
      <button type="submit" class="btn">追加する</button>
    </form>
  </section>
</main>

<footer class="site-footer">コスプレアチーブメント — データはお使いのブラウザにのみ保存されます</footer>

<script src="js/achievements-data.js"></script>
<script src="js/app.js"></script>
<script>
  let currentFilter = "all";

  function fmtDate(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} 獲得`;
  }

  function renderFilters() {
    const cats = ["all", ...Object.keys(CATEGORIES)];
    document.getElementById("filters").innerHTML = cats.map(c => {
      const label = c === "all" ? "🌐 すべて" : `${CATEGORIES[c].icon} ${CATEGORIES[c].label}`;
      return `<button class="filter-btn ${c === currentFilter ? "active" : ""}" data-cat="${c}">${label}</button>`;
    }).join("");
    document.querySelectorAll(".filter-btn").forEach(b =>
      b.addEventListener("click", () => { currentFilter = b.dataset.cat; renderFilters(); renderList(); })
    );
  }

  function cardHTML(a, map) {
    const un = !!map[a.id];
    const del = a.cat === "custom"
      ? `<button class="del-btn" data-del="${a.id}" title="このカスタム実績を削除">削除</button>` : "";
    return `
      <div class="ach-card ${un ? "unlocked" : ""}" data-id="${a.id}" role="button" tabindex="0" aria-pressed="${un}">
        <span class="icon">${a.icon}</span>
        <span class="body">
          <span class="title" style="display:block">${a.title}</span>
          <span class="desc" style="display:block">${a.desc || ""}</span>
          <span class="date">${un ? fmtDate(map[a.id]) : ""}</span>
        </span>
        ${del}
      </div>`;
  }

  function renderList() {
    const map = getUnlockedMap();
    const all = getAllAchievements();
    const catsToShow = currentFilter === "all" ? Object.keys(CATEGORIES) : [currentFilter];
    let html = "";
    for (const cat of catsToShow) {
      const items = all.filter(a => a.cat === cat);
      if (!items.length) continue;
      const done = items.filter(a => map[a.id]).length;
      html += `
        <section class="cat-section">
          <h2 class="cat-title">${CATEGORIES[cat].icon} ${CATEGORIES[cat].label}
            <span class="count">${done} / ${items.length}</span></h2>
          <div class="ach-grid">${items.map(a => cardHTML(a, map)).join("")}</div>
        </section>`;
    }
    document.getElementById("achList").innerHTML = html;

    document.querySelectorAll(".ach-card").forEach(card => {
      const activate = (e) => {
        if (e.target.dataset && e.target.dataset.del) return; // 削除ボタンは別処理
        const id = card.dataset.id;
        const got = toggleUnlocked(id);
        const a = findAchievement(id);
        renderList();
        renderProgressBadge(document.getElementById("progressBadge"));
        if (got) {
          showToast(`🏆 アチーブメント獲得！「${a.title}」`);
          const el = document.querySelector(`.ach-card[data-id="${CSS.escape(id)}"]`);
          if (el) el.classList.add("just-unlocked");
        }
      };
      card.addEventListener("click", activate);
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); activate(e); }
      });
    });

    document.querySelectorAll("[data-del]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const a = findAchievement(btn.dataset.del);
        if (confirm(`「${a.title}」を削除しますか？`)) {
          removeCustomAchievement(btn.dataset.del);
          renderList();
          renderProgressBadge(document.getElementById("progressBadge"));
        }
      });
    });
  }

  document.getElementById("addForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const title = document.getElementById("fTitle").value;
    if (!title.trim()) return;
    addCustomAchievement(title, document.getElementById("fDesc").value, document.getElementById("fIcon").value);
    e.target.reset();
    currentFilter = "custom";
    renderFilters();
    renderList();
    renderProgressBadge(document.getElementById("progressBadge"));
    showToast("⭐ アチーブメントを追加しました！");
  });

  renderFilters();
  renderList();
  renderProgressBadge(document.getElementById("progressBadge"));
</script>
</body>
</html>
