<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アチーブメントビンゴ | コスプレアチーブメント</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="index.html" class="logo">🏆 <span class="mark">コスプレアチーブメント</span></a>
    <nav class="nav">
      <a href="index.html">TOP</a>
      <a href="achievements.html">一覧</a>
      <a href="bingo.html" class="active">ビンゴ</a>
    </nav>
    <span class="progress-badge" id="progressBadge"></span>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <h1>🎯 アチーブメントビンゴ</h1>
    <p>アチーブメントからランダムに作られた5×5ビンゴ。マスをタップしても獲得できます。カードは保存されるので、次に来たときも同じカードで続きから遊べます。</p>
  </div>

  <div class="bingo-wrap">
    <div class="bingo-board-outer">
      <div class="bingo-title-row">
        <h2>COSPLAY BINGO</h2>
        <span class="bingo-lines" id="bingoLines"></span>
      </div>
      <div class="bingo-grid" id="bingoGrid"></div>
    </div>

    <aside class="bingo-side">
      <div class="panel">
        <h3>📥 画像で保存・シェア</h3>
        <p>ビンゴカードを1枚の画像にして、ダウンロードやSNSでの共有ができます。</p>
        <button class="btn" id="btnDownload">画像をダウンロード</button>
        <button class="btn" id="btnShare">画像をシェア</button>
        <button class="btn share-x" id="btnShareX">𝕏 でポスト</button>
      </div>
      <div class="panel">
        <h3>🔀 カードを作り直す</h3>
        <p>マスの配置をシャッフルして新しいカードを作ります（獲得済みの実績はそのまま）。</p>
        <button class="btn ghost" id="btnShuffle">シャッフル</button>
      </div>
    </aside>
  </div>
</main>

<footer class="site-footer">コスプレアチーブメント — データはお使いのブラウザにのみ保存されます</footer>

<script src="js/achievements-data.js"></script>
<script src="js/app.js"></script>
<script>
  let cardIds = generateBingoCard(false);

  function getCells() {
    // 25マス分の {ach, done} 配列（中央はFREE）
    const map = getUnlockedMap();
    const cells = [];
    let k = 0;
    for (let i = 0; i < 25; i++) {
      if (i === 12) { cells.push({ free: true, done: true }); continue; }
      const a = findAchievement(cardIds[k++]);
      cells.push({ ach: a, done: a ? !!map[a.id] : false });
    }
    return cells;
  }

  function renderBoard() {
    const cells = getCells();
    document.getElementById("bingoGrid").innerHTML = cells.map((c, i) => {
      if (c.free) return `<div class="bingo-cell free"><span class="c-icon">🌟</span><span class="c-title">FREE</span></div>`;
      if (!c.ach) return `<div class="bingo-cell"></div>`;
      return `
        <div class="bingo-cell ${c.done ? "done" : ""}" data-id="${c.ach.id}" role="button" tabindex="0" title="${c.ach.desc || c.ach.title}">
          <span class="c-icon">${c.ach.icon}</span>
          <span class="c-title">${c.ach.title}</span>
        </div>`;
    }).join("");

    const lines = countBingoLines(cells.map(c => c.done));
    document.getElementById("bingoLines").textContent =
      lines > 0 ? `🎉 ${lines} BINGO!` : "ビンゴを目指そう！";

    document.querySelectorAll(".bingo-cell[data-id]").forEach(cell => {
      const activate = () => {
        const got = toggleUnlocked(cell.dataset.id);
        const before = lines;
        renderBoard();
        renderProgressBadge(document.getElementById("progressBadge"));
        if (got) {
          const a = findAchievement(cell.dataset.id);
          const after = countBingoLines(getCells().map(c => c.done));
          showToast(after > before ? "🎉 BINGO達成！おめでとう！" : `🏆 獲得！「${a.title}」`);
        }
      };
      cell.addEventListener("click", activate);
      cell.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); activate(); }
      });
    });
  }

  document.getElementById("btnShuffle").addEventListener("click", () => {
    if (confirm("カードをシャッフルしますか？（獲得済みアチーブメントは消えません）")) {
      cardIds = generateBingoCard(true);
      renderBoard();
      showToast("🔀 新しいカードを作りました！");
    }
  });

  // ============ 画像生成（Canvas） ============
  // roundRect 非対応ブラウザ向けポリフィル
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
      this.moveTo(x + r, y);
      this.arcTo(x + w, y, x + w, y + h, r);
      this.arcTo(x + w, y + h, x, y + h, r);
      this.arcTo(x, y + h, x, y, r);
      this.arcTo(x, y, x + w, y, r);
      this.closePath();
      return this;
    };
  }

  function wrapText(ctx, text, maxWidth, maxLines) {
    const lines = [];
    let line = "";
    for (const ch of text) {
      if (ctx.measureText(line + ch).width > maxWidth && line) {
        lines.push(line);
        line = ch;
        if (lines.length === maxLines) break;
      } else {
        line += ch;
      }
    }
    if (lines.length < maxLines && line) lines.push(line);
    else if (line && lines.length === maxLines) {
      lines[maxLines - 1] = lines[maxLines - 1].slice(0, -1) + "…";
    }
    return lines;
  }

  function drawBingoImage() {
    const cells = getCells();
    const lines = countBingoLines(cells.map(c => c.done));
    const W = 1080, PAD = 48, TITLE_H = 150, FOOT_H = 90;
    const gridW = W - PAD * 2;
    const cellGap = 10;
    const cellSize = (gridW - cellGap * 4) / 5;
    const H = TITLE_H + gridW + FOOT_H + PAD;

    const cv = document.createElement("canvas");
    cv.width = W; cv.height = H;
    const ctx = cv.getContext("2d");

    // 背景
    ctx.fillStyle = "#f7faf8";
    ctx.fillRect(0, 0, W, H);

    // タイトル
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#22815a";
    ctx.font = "900 52px 'Hiragino Kaku Gothic ProN','Yu Gothic UI',Meiryo,sans-serif";
    ctx.fillText("コスプレアチーブメント ビンゴ", W / 2, 68);
    ctx.fillStyle = "#2f9e6e";
    ctx.font = "700 30px 'Hiragino Kaku Gothic ProN','Yu Gothic UI',Meiryo,sans-serif";
    ctx.fillText(lines > 0 ? `🎉 ${lines} BINGO ACHIEVED! 🎉` : "COSPLAYER'S BINGO CARD", W / 2, 118);

    // セル
    cells.forEach((c, i) => {
      const r = Math.floor(i / 5), col = i % 5;
      const x = PAD + col * (cellSize + cellGap);
      const y = TITLE_H + r * (cellSize + cellGap);

      ctx.beginPath();
      ctx.roundRect(x, y, cellSize, cellSize, 14);
      if (c.free) {
        ctx.fillStyle = "#2f9e6e";
      } else if (c.done) {
        ctx.fillStyle = "#e7f5ee";
      } else {
        ctx.fillStyle = "#ffffff";
      }
      ctx.fill();
      if (!c.free) {
        ctx.strokeStyle = c.done ? "#2f9e6e" : "#dce8e0";
        ctx.lineWidth = c.done ? 3 : 1.5;
        ctx.stroke();
      }

      const cx = x + cellSize / 2;
      if (c.free) {
        ctx.fillStyle = "#fff";
        ctx.font = "48px sans-serif";
        ctx.fillText("🌟", cx, y + cellSize / 2 - 18);
        ctx.font = "900 30px sans-serif";
        ctx.fillText("FREE", cx, y + cellSize / 2 + 32);
        return;
      }
      if (!c.ach) return;

      // アイコン（未獲得は薄く）
      ctx.globalAlpha = c.done ? 1 : 0.3;
      ctx.font = "44px sans-serif";
      ctx.fillStyle = "#263a30";
      ctx.fillText(c.ach.icon, cx, y + 44);
      ctx.globalAlpha = 1;

      // タイトル（折返し最大3行）
      ctx.fillStyle = c.done ? "#263a30" : "#a3b5aa";
      ctx.font = "700 21px 'Hiragino Kaku Gothic ProN','Yu Gothic UI',Meiryo,sans-serif";
      const tl = wrapText(ctx, c.ach.title, cellSize - 20, 3);
      tl.forEach((t, li) => ctx.fillText(t, cx, y + 84 + li * 26));

      // 達成チェック
      if (c.done) {
        ctx.fillStyle = "#2f9e6e";
        ctx.font = "900 26px sans-serif";
        ctx.fillText("✓", x + cellSize - 20, y + 22);
      }
    });

    // フッター
    const p = getProgress();
    ctx.fillStyle = "#6b8377";
    ctx.font = "24px 'Hiragino Kaku Gothic ProN','Yu Gothic UI',Meiryo,sans-serif";
    ctx.fillText(`獲得アチーブメント ${p.done} / ${p.total}　#コスプレアチーブメント`, W / 2, TITLE_H + gridW + 52);

    return cv;
  }

  function canvasToBlob(cv) {
    return new Promise(res => cv.toBlob(res, "image/png"));
  }

  document.getElementById("btnDownload").addEventListener("click", async () => {
    const blob = await canvasToBlob(drawBingoImage());
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "cosplay-bingo.png";
    a.click();
    URL.revokeObjectURL(url);
    showToast("📥 画像をダウンロードしました！");
  });

  const SHARE_TEXT = "コスプレアチーブメントビンゴに挑戦中！ #コスプレアチーブメント";

  document.getElementById("btnShare").addEventListener("click", async () => {
    const blob = await canvasToBlob(drawBingoImage());
    const file = new File([blob], "cosplay-bingo.png", { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], text: SHARE_TEXT });
      } catch (e) { /* キャンセル時は何もしない */ }
    } else {
      // 共有非対応環境はダウンロードにフォールバック
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "cosplay-bingo.png"; a.click();
      URL.revokeObjectURL(url);
      showToast("この環境は直接共有に非対応のため、画像を保存しました。SNSに添付してシェアしてね！");
    }
  });

  document.getElementById("btnShareX").addEventListener("click", async () => {
    // 画像を保存してから X のポスト画面を開く（Web Intent は画像添付不可のため）
    const blob = await canvasToBlob(drawBingoImage());
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "cosplay-bingo.png"; a.click();
    URL.revokeObjectURL(url);
    window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(SHARE_TEXT), "_blank");
    showToast("画像を保存しました！ポスト画面に添付してね📎");
  });

  renderBoard();
  renderProgressBadge(document.getElementById("progressBadge"));
</script>
</body>
</html>
